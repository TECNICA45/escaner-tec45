<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reporte TEC45</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

#reader{
max-width:500px;
margin:auto;
}

input,select,textarea,button{
width:90%;
max-width:500px;
padding:12px;
margin:10px;
font-size:18px;
}

button{
background:#0b57d0;
color:white;
border:none;
border-radius:8px;
}
</style>

</head>

<body>

<h1>📋 Nuevo Reporte</h1>

<p>Escanee al alumno que reporta</p>

<div id="reader"></div>

<input type="text" id="curpReporta" placeholder="CURP Reporta" readonly>

<input type="text" id="curpReportado" placeholder="CURP Reportado" readonly>
<div id="datosReporta" style="display:none;border:2px solid #2196F3;padding:15px;margin:10px;border-radius:10px;">
<h3>👤 Alumno que reporta</h3>
<div id="nombreReporta"></div>
<div id="grupoReporta"></div>
</div>

<div id="datosReportado" style="display:none;border:2px solid #f44336;padding:15px;margin:10px;border-radius:10px;">
<h3>👤 Alumno reportado</h3>
<div id="nombreReportado"></div>
<div id="grupoReportado"></div>
</div>
<select id="motivo">
<option>Agresión verbal</option>
<option>Agresión física</option>
<option>Bullying</option>
<option>Daño a pertenencias</option>
<option>Incumplimiento de acuerdos</option>
<option>Conducta inapropiada</option>
<option>Otro</option>
</select>

<textarea id="observaciones" rows="4" placeholder="Observaciones"></textarea>

<button type="button" onclick="guardarReporte()">
Guardar Reporte
</button>

<script>

const API_REPORTE =
"https://script.google.com/macros/s/AKfycbyDwW3m4z2Mrz878Czlbkpiy75WzV0sALyOJEBv3XzuQ33VRiBL3J0hS7PFE-QMnAoE8Q/exec";

let paso = 1;

const scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
},
false
);

scanner.render(function(curp){

if(paso===1){

document.getElementById("curpReporta").value=curp;

fetch(
API_REPORTE +
"?accion=consultarAlumno&curp=" +
encodeURIComponent(curp)
)
.then(r=>r.json())
.then(datos=>{

if(datos.ok){

document.getElementById("datosReporta").style.display="block";

document.getElementById("nombreReporta").innerHTML =
"<b>" + datos.nombre + "</b>";

document.getElementById("grupoReporta").innerHTML =
"Grupo: " + datos.grupo;

}

});

alert("Ahora escanee al alumno reportado");

paso=2;

return;

}

if(paso===2){

document.getElementById("curpReportado").value=curp;

fetch(
API_REPORTE +
"?accion=consultarAlumno&curp=" +
encodeURIComponent(curp)
)
.then(r=>r.json())
.then(datos=>{

if(datos.ok){

document.getElementById("datosReportado").style.display="block";

document.getElementById("nombreReportado").innerHTML =
"<b>" + datos.nombre + "</b>";

document.getElementById("grupoReportado").innerHTML =
"Grupo: " + datos.grupo;

}

});

alert("Listo. Capture el motivo.");

paso=3;

}
});

async function guardarReporte(){

try{

alert("1. Entré a guardarReporte");

const url =
API_REPORTE +
"?accion=reporte" +
"&curpReporta=" +
encodeURIComponent(document.getElementById("curpReporta").value) +
"&curpReportado=" +
encodeURIComponent(document.getElementById("curpReportado").value) +
"&motivo=" +
encodeURIComponent(document.getElementById("motivo").value) +
"&observaciones=" +
encodeURIComponent(document.getElementById("observaciones").value);

alert("2. URL creada");

alert(url);

const r = await fetch(url);

alert("3. Respuesta recibida");

const texto = await r.text();

alert(texto);

}catch(error){

alert("ERROR: " + error);

}


}

</script>

</body>
</html>
